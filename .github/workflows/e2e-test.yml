name: E2E Tests

on:
  pull_request:
    branches: [main]

  push:
    branches: [main]

jobs:
  test:
    name: Playwright
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Validate dependency resolution policy
        working-directory: ./frontend
        run: yarn check:resolutions

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: yarn install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: ./frontend
        run: npx playwright install --with-deps

      - name: Build frontend
        working-directory: ./frontend
        run: yarn build
        env:
          NEXT_PUBLIC_E2E: "1"

      - name: Run E2E tests
        working-directory: ./frontend
        run: |
          NEXT_PUBLIC_E2E=1 yarn start &
          yarn wait-on http://localhost:3000 --timeout 60000
          npx playwright test e2e/smoke.spec.ts e2e/donation.spec.ts e2e/dream-detail-flow.spec.ts --timeout=600000
        env:
          NEXT_PUBLIC_E2E: "1"
          CI: "true"
        timeout-minutes: 20
